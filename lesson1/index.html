<!-- 
    HTML bilan tanishuv
    HTML - ingliz tilidan HyperText Markup Language so'zlarining qisqartmasidan olingan bo'lib, o'zbek tiliga Gipermatnlarni Belgilash Tili degan ma'noni beradi. Ya'ni bu til asosan matnlar yozish uchun yaratilgan. HTMLda asosiy 3ta ibora mavjud: teg, atribut, element.

    Teg. 
    HTML odatda teglardan iborat bo’ladi. Teglar biror bir elementni belgilash uchun xizmat qiladi. Tegni ochish uchun uning nomini - kichik (<) va katta (>) belgilar orasida yozamiz. Tegni yopish, uni ochish kabi yoziladi, lekin tegni yopishda uni ochishdan farqli o’laroq, teg nomi oldidan slesh belgisi (/) qo’yiladi. HTML'da izoh  -->

<code><!-- --></code>

<!-- belgilari orasida yoziladi. Bu belgilar orasida yozilgan matn kompilyator tomonidan inobatga olinmaydi va brauzerda ko’rinmaydi.

    HTML'da teglarni yozib ko’ramiz. Buning uchun Notepad/Блокнот yoki gedit dasturini oching va biror papkaga index.html deb saqlang. ushbu HTML faylimiz ichiga yuqorida aytilganidek:
-->

<foo> Hello, World! </foo>
